name: Daily Stoicism Today Update

on:
  schedule:
    - cron: "5 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-briefing:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run updater
        run: python scripts/update_briefing.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/briefing.json data/widget_fields.json data/playlist.json
          git diff --cached --quiet || git commit -m "Daily Stoicism Today update"
          git push
