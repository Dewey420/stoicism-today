name: Daily Stoicism Today Update

on:
  schedule:
    # GitHub cron uses UTC. This lands at 1:05 AM CDT / 12:05 AM CST.
    - cron: "5 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-stoicism-today-update
  cancel-in-progress: false

jobs:
  update-briefing:
    runs-on: ubuntu-latest
    env:
      BRIEFING_TIMEZONE: America/Chicago
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Sync tarot source
        run: python scripts/sync_tarot_source.py
      - name: Run updater
        run: python scripts/update_briefing.py
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/briefing.json data/widget_fields.json data/playlist.json data/tarot_cards.json
          git diff --cached --quiet || git commit -m "Daily Stoicism Today update"
          git push
